<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — EcoPro USA Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body data-page="login">

  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-logo">
        <h1>EcoPro USA</h1>
        <span>Admin Panel</span>
      </div>

      <div id="login-error" class="login-error"></div>

      <form id="login-form" autocomplete="on">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="admin@ecopro-usa.com" autocomplete="email" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block">
          <span class="spinner"></span>
          <span class="btn-text">Sign In</span>
        </button>
      </form>
    </div>
  </div>

  <script src="js/admin.js"></script>
</body>
</html>
