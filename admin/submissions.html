<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Submissions — EcoPro USA Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body data-page="submissions">

  <!-- Header -->
  <header class="admin-header">
    <div class="header-left">
      <h1>EcoPro USA</h1>
    </div>
    <div class="header-right">
      <a href="https://ecopro.keelanodoherty.org" target="_blank" class="view-site-link">&#8599; View Site</a>
      <span class="user-email">loading...</span>
      <button class="btn-logout">Sign Out</button>
    </div>
  </header>

  <!-- Sidebar -->
  <nav class="admin-sidebar">
    <ul class="sidebar-nav">
      <li class="nav-section">Content</li>
      <li><a href="dashboard.html"><span class="nav-icon">&#9632;</span> Dashboard</a></li>
      <li><a href="products.html"><span class="nav-icon">&#9776;</span> Products</a></li>
      <li><a href="submissions.html" class="active"><span class="nav-icon">&#9993;</span> Submissions</a></li>
      <li class="nav-section">Tools</li>
      <li><a href="#" id="nav-rebuild"><span class="nav-icon">&#8635;</span> Rebuild Site</a></li>
    </ul>
    <div class="sidebar-footer">
      <small>EcoPro Admin v1.0</small>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="admin-main">
    <div class="page-header">
      <div>
        <h2 class="page-title">Form Submissions</h2>
        <p class="page-subtitle">Contact form submissions from the website</p>
      </div>
      <button id="btn-refresh" class="btn btn-outline btn-sm">
        <span class="btn-text">&#8635; Refresh</span>
      </button>
    </div>

    <div class="card">
      <div class="card-body-flush" id="submissions-container">
        <div class="empty-state">
          <div class="empty-icon">&#9993;</div>
          <p>Loading submissions...</p>
        </div>
      </div>
    </div>
  </main>

  <!-- Submission Detail Modal -->
  <div class="modal-overlay" id="submission-modal">
    <div class="modal">
      <div class="modal-header">
        <h3>Submission Details</h3>
        <button class="modal-close" id="modal-close">&times;</button>
      </div>
      <div class="modal-body" id="modal-body">
      </div>
    </div>
  </div>

  <script src="js/admin.js"></script>
</body>
</html>
